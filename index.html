<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra Pak AR - Fix Audio & Drag</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; touch-action: none; }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); color: #00ff00;
        }
        .btn-start {
            padding: 15px 30px; background: #00ff00; color: black;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="text-align: center;">
            <h2>SISTEMA AR INTERACTIVO</h2>
            <button id="startButton" class="btn-start">INICIAR ESCANEO</button>
            <p id="status">Esperando interacción...</p>
        </div>
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let mindarThree, scene, camera, renderer;
        const mixers = [];
        const sounds = [];
        const clickableModels = [];
        let isLogging = false;
        
        let selectedObject = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const intersectionPoint = new THREE.Vector3();

        const CONFIG = [
            { model: 'robot.glb', sound: 's1.mp3', scale: 0.15 },
            { model: 'trex.glb', sound: 's2.mp3', scale: 0.06 },
            { model: 'skeleton.glb', sound: 's3.mp3', scale: 0.2 },
            { model: 'cat.glb', sound: 's4.mp3', scale: 0.3 }
        ];

        const start = async () => {
            mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: './targetstetra.mind',
                filterMinCF: 0.0001,
                filterBeta: 0.001
            });

            ({ renderer, scene, camera } = mindarThree);
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2));

            // INICIALIZACIÓN DE AUDIO
            const listener = new THREE.AudioListener();
            camera.add(listener);
            const audioLoader = new THREE.AudioLoader();

            const loader = new GLTFLoader();

            CONFIG.forEach((data, index) => {
                const anchor = mindarThree.addAnchor(index);

                // Cargar sonido correspondiente
                const sound = new THREE.Audio(listener);
                audioLoader.load(data.sound, (buffer) => {
                    sound.setBuffer(buffer);
                    sound.setLoop(false);
                    sound.setVolume(0.5);
                });
                sounds[index] = sound;

                loader.load(data.model, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(data.scale, data.scale, data.scale);
                    model.rotation.x = Math.PI / 2;
                    model.userData = { name: data.model, id: index };
                    anchor.group.add(model);
                    clickableModels.push(model);

                    if (gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        mixer.clipAction(gltf.animations[0]).play();
                        mixers.push(mixer);
                    }
                });

                anchor.onTargetFound = () => {
                    if (sounds[index]) sounds[index].play(); // Play al detectar
                    if (!isLogging) {
                        enviarLogApp('DETECCION', data.model, index);
                        bloquearLogsTemporales();
                    }
                };

                anchor.onTargetLost = () => {
                    if (sounds[index]) sounds[index].pause(); // Pause al perder
                };
            });

            // SOPORTE TÁCTIL PARA ARRASTRE
            const onPointerDown = (e) => {
                actualizarMouse(e);
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(clickableModels, true);

                if (intersects.length > 0) {
                    let target = intersects[0].object;
                    while (target.parent && !target.userData.name) target = target.parent;
                    selectedObject = target;

                    if (!isLogging) {
                        enviarLogApp('INTERACCION_MANUAL', target.userData.name, target.userData.id);
                        bloquearLogsTemporales();
                    }
                }
            };

            const onPointerMove = (e) => {
                if (!selectedObject) return;
                actualizarMouse(e);
                raycaster.setFromCamera(mouse, camera);
                if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                    selectedObject.position.x = intersectionPoint.x;
                    selectedObject.position.y = intersectionPoint.y;
                }
            };

            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', () => { selectedObject = null; });

            await mindarThree.start();
            document.querySelector("#ui").style.display = "none";
            const clock = new THREE.Clock();
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                mixers.forEach(m => m.update(delta));
                renderer.render(scene, camera);
            });
        }

        const actualizarMouse = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
        };

        const bloquearLogsTemporales = () => {
            isLogging = true;
            setTimeout(() => { isLogging = false; }, 3000);
        };

        const enviarLogApp = (tipo, modelo, index) => {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    tipo: 'ACCION_USUARIO',
                    detalle: tipo,
                    modelo: modelo,
                    targetIdx: index
                }));
            }
        };

        document.querySelector("#startButton").addEventListener('click', start);
    </script>
</body>
</html>
