<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra Pak AR - Debug Mode</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-family: monospace;
        }

        .btn-start {
            padding: 15px 30px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div style="text-align: center;">
            <h2>SISTEMA TETRA AR</h2>
            <button id="startButton" class="btn-start">INICIAR MOTOR</button>
            <p id="status">Esperando interacción...</p>
        </div>
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let mindarThree, scene, camera, renderer;
        const mixers = [];
        const sounds = [];
        const status = document.querySelector("#status");

        // Configuración basada exactamente en tus archivos de la captura
        const CONFIG = [
            { model: 'robot.glb', sound: 's1.mp3', scale: 0.2 },
            { model: 'trex.glb', sound: 's2.mp3', scale: 0.1 },
            { model: 'skeleton.glb', sound: 's3.mp3', scale: 0.2 },
            { model: 'cat.glb', sound: 's4.mp3', scale: 0.3 }
        ];

        const start = async () => {
            status.innerText = "Cargando hardware...";

            mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: './targetstetra.mind', // Archivo unificado
            });

            ({ renderer, scene, camera } = mindarThree);

            // Luz ambiental fuerte para asegurar visibilidad
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2);
            scene.add(light);
            const directLight = new THREE.DirectionalLight(0xffffff, 1);
            directLight.position.set(0, 1, 1);
            scene.add(directLight);

            const loader = new GLTFLoader();
            const audioLoader = new THREE.AudioLoader();
            const listener = new THREE.AudioListener();
            camera.add(listener);

            CONFIG.forEach((data, index) => {
                const anchor = mindarThree.addAnchor(index);

                // Cargar Audio
                const s = new THREE.Audio(listener);
                audioLoader.load(data.sound, (buffer) => {
                    s.setBuffer(buffer);
                });
                sounds[index] = s;

                // Cargar Modelo con corrección de rotación
                loader.load(data.model, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(data.scale, data.scale, data.scale);

                    // Ajuste de rotación para caras laterales de un cubo
                    model.rotation.x = Math.PI / 2;

                    anchor.group.add(model);
                    console.log(`Modelo ${data.model} cargado en target ${index}`);

                    if (gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        mixer.clipAction(gltf.animations[0]).play();
                        mixers.push(mixer);
                    }
                });

                anchor.onTargetFound = () => {
                    status.innerText = `Detectado: ${data.model}`;
                    if (sounds[index]) sounds[index].play();

                    if (window.ReactNativeWebView) {
                        window.ReactNativeWebView.postMessage(JSON.stringify({
                            tipo: 'INTERACCION_AR',
                            detalle: `Detección de ${data.model}`,
                            targetIdx: index
                        }));
                    }
                };

                anchor.onTargetLost = () => {
                    status.innerText = "Buscando target...";
                    if (sounds[index]) sounds[index].pause();
                };
            });

            await mindarThree.start();
            document.querySelector("#ui").style.display = "none";

            const clock = new THREE.Clock();
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                mixers.forEach(m => m.update(delta));
                renderer.render(scene, camera);
            });
        }

        document.querySelector("#startButton").addEventListener('click', start);
    </script>
</body>

</html>
