<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra Pak AR - Engine</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); color: #00ff00;
        }
        .btn-start {
            padding: 18px 35px; background: #00ff00; color: black;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="text-align: center;">
            <h2 style="color: #fff; margin-bottom: 20px;">SISTEMA AR MULTIUSUARIO</h2>
            <button id="startButton" class="btn-start">INICIAR ESCANEO TETRA</button>
            <p id="status" style="color: #00ff00; margin-top: 15px;">Listo para iniciar</p>
        </div>
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let mindarThree, scene, camera, renderer;
        const mixers = [], sounds = [], clickableModels = [];
        let isDragging = false, selectedObject = null, isLogging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const status = document.querySelector("#status");

        const CONFIG = [
            { model: 'robot.glb', sound: 's1.mp3', scale: 0.15 },
            { model: 'trex.glb', sound: 's2.mp3', scale: 0.06 },
            { model: 'skeleton.glb', sound: 's3.mp3', scale: 0.2 },
            { model: 'cat.glb', sound: 's4.mp3', scale: 0.3 }
        ];

        const start = async () => {
            status.innerText = "Inicializando hardware...";

            mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: './targetstetra.mind', 
            });

            ({ renderer, scene, camera } = mindarThree);
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.5));

            const listener = new THREE.AudioListener();
            camera.add(listener);
            const audioLoader = new THREE.AudioLoader();
            const loader = new GLTFLoader();

            CONFIG.forEach((data, i) => {
                const anchor = mindarThree.addAnchor(i);
                
                // Cargar Sonido Individual
                const s = new THREE.Audio(listener);
                audioLoader.load(data.sound, (buffer) => {
                    s.setBuffer(buffer);
                    s.setVolume(0.5);
                });
                sounds[i] = s;

                // Cargar Modelo
                loader.load(data.model, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(data.scale, data.scale, data.scale);
                    model.rotation.x = Math.PI / 2;
                    
                    // ID para el log multiusuario
                    model.userData = { name: data.model };
                    
                    anchor.group.add(model);
                    clickableModels.push(model);

                    if (gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        mixer.clipAction(gltf.animations[0]).play();
                        mixers.push(mixer);
                    }
                });

                anchor.onTargetFound = () => {
                    status.innerText = `Detectado: ${data.model}`;
                    if (sounds[i] && !sounds[i].isPlaying) sounds[i].play();
                    
                    // Registro automático de detección
                    if (!isLogging) {
                        enviarLog('DETECCION_AUTO', data.model);
                        bloquearLogs();
                    }
                };

                anchor.onTargetLost = () => {
                    status.innerText = "Buscando cubo...";
                    if (sounds[i]) sounds[i].pause();
                };
            });

            // GESTIÓN TÁCTIL (Desplazamiento Delta)
            const container = document.querySelector("#container");
            
            container.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                
                const intersects = raycaster.intersectObjects(clickableModels, true);

                if (intersects.length > 0) {
                    isDragging = true;
                    // Buscar el padre que contiene el nombre del modelo
                    let target = intersects[0].object;
                    while (target.parent && !target.userData.name) target = target.parent;
                    
                    selectedObject = target;
                    previousMousePosition = { x: e.clientX, y: e.clientY };

                    // Log de interacción manual
                    if (!isLogging) {
                        enviarLog('MANIPULACION_TACTIL', target.userData.name);
                        bloquearLogs();
                    }
                }
            });

            container.addEventListener('pointermove', (e) => {
                if (!isDragging || !selectedObject) return;
                
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                // Mover modelo basado en el desplazamiento del dedo
                selectedObject.position.x += deltaX * 0.005;
                selectedObject.position.y -= deltaY * 0.005; 
                
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            container.addEventListener('pointerup', () => {
                isDragging = false;
                selectedObject = null;
            });

            await mindarThree.start();
            document.querySelector("#ui").style.display = "none";

            const clock = new THREE.Clock();
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                mixers.forEach(m => m.update(delta));
                renderer.render(scene, camera);
            });
        };

        const enviarLog = (accion, modelo) => {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    tipo: 'ACCION_USUARIO',
                    detalle: accion,
                    modelo: modelo
                }));
            }
        };

        const bloquearLogs = () => {
            isLogging = true;
            setTimeout(() => { isLogging = false; }, 4000); // 4 segundos de cooldown
        };

        document.querySelector("#startButton").addEventListener('click', start);
    </script>
</body>
</html>
