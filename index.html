<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
      }
    }
    </script>
</head>
<body>
    <div id="container"></div>
    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const mindarThree = new MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: './targetstetra.mind',
            filterMinCF: 0.0001, filterBeta: 0.001
        });

        const { renderer, scene, camera } = mindarThree;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const models = [];

        const start = async () => {
            const loader = new GLTFLoader();
            const config = [
                { m: 'robot.glb', s: 0.15 }, { m: 'trex.glb', s: 0.06 },
                { m: 'skeleton.glb', s: 0.2 }, { m: 'cat.glb', s: 0.3 }
            ];

            config.forEach((data, i) => {
                const anchor = mindarThree.addAnchor(i);
                loader.load(data.m, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(data.s, data.s, data.s);
                    model.userData = { name: data.m }; // ID para el log
                    anchor.group.add(model);
                    models.push(model);
                });
            });

            // Evento de pulsación
            window.addEventListener('click', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(models, true);
                
                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    // Enviar mensaje a React Native
                    window.parent.postMessage(JSON.stringify({
                        tipo: 'ACCION_USUARIO',
                        detalle: 'Pulsación de modelo',
                        modelo: obj.parent.userData.name || 'Modelo AR'
                    }), "*");
                }
            });

            await mindarThree.start();
            renderer.setAnimationLoop(() => renderer.render(scene, camera));
        }
        start();
    </script>
</body>
</html>
